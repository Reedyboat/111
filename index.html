<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨Bear🐻生日快乐！✨</title>
    <!--音频优先最先加载 彻底解决音乐延迟-->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
            /* 基础背景色，会被JS动态覆盖 */
            background-color: #8e9cab;
        }

        /* 通用页面样式 */
        .page {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ========== 第一页：黑胶播放器 ========== */
        /* 第1层：浅色播放器底座 */
        .player {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background-color: #c2c9d1;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* 第2层：黑色黑胶唱片 保留你原本纹路质感 */
        .record {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 330px;
            height: 330px;
            border-radius: 50%;
            /* 清晰的同心圆纹路 */
            background: 
                linear-gradient(15deg, #111 20%, #2b2b2b 45%, #111 70%),
                repeating-radial-gradient(
                    circle at center,
                    transparent 0 6px,
                    #191919 6px 9px
                );
            background-blend-mode: multiply;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35);
            animation: spin 18s linear infinite;
            cursor: pointer;
            z-index: 2;
        }

        /* 唱片中心圆孔 */
        .record::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 52px;
            height: 52px;
            background-color: #8e9cab;
            border-radius: 50%;
        }

        /* 第3层：白色唱针组件 */
        .tonearm {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 3;
            pointer-events: none; /* 不阻挡唱片点击 */
        }

        /* 唱针固定基座（底座右上角的球形） */
        .tonearm-base {
            position: absolute;
            top: 32px;
            right: 32px;
            width: 18px;
            height: 18px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        /* 白色加粗唱针杆 */
        .tonearm-arm {
            position: absolute;
            top: 32px;
            right: 32px;
            width: 158px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 3px;
            transform-origin: right center; /* 以基座为中心摆动 */
            /* 初始角度：-25度，末端大幅往下摆 */
            transform: rotate(-25deg);
            transition: transform 0.5s ease-in-out;
        }

        /* 唱针尖头球形 */
        .tonearm-tip {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 7px;
            height: 7px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        /* 暂停状态：唱针抬起至5度，离开唱片 */
        .tonearm-arm.lifted {
            transform: rotate(5deg);
        }

        /* 第4层：顶层文字 */
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 36px;
            letter-spacing: 3px;
            font-weight: 500;
            z-index: 4;
            pointer-events: none; /* 不阻挡唱片点击 */
        }

        /* 唱片旋转动画 */
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 暂停状态：唱片停止旋转 */
        .record.paused {
            animation-play-state: paused;
        }

        /* 操作提示文字 */
        .control-hint {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 4;
            pointer-events: none;
        }

        /* 下滑提示文字 */
        .scroll-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 4;
            pointer-events: none;
        }

        /* 底部向下箭头 */
        .down-arrow {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            z-index: 4;
            pointer-events: none;
            animation: bounce 2s infinite;
        }

        /* 箭头跳动动画 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-8px);
            }
            60% {
                transform: translateX(-50%) translateY(-4px);
            }
        }

        /* ========== 第二页：实用功能区 ========== */
        .second-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 第二页右上角音乐控制按钮 */
        .music-control {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
            z-index: 10;
        }

        .music-control:hover {
            transform: scale(1.1);
        }

        .music-control:active {
            transform: scale(0.95);
        }

        /* 第二页生日祝福标题 */
        .birthday-title {
            color: #ffffff;
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 功能卡片容器 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 50px;
        }

        /* 通用卡片样式 - 半透明磨砂效果 */
        .card {
            background-color: rgba(255, 255, 255, 0.75); /* 半透明白色 */
            backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-title {
            color: #444;
            font-size: 16px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .card-value {
            color: #222;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-subtitle {
            color: #555;
            font-size: 12px;
        }

        /* 实时时钟卡片 */
        .clock-card {
            grid-column: 1 / -1;
        }

        .clock-time {
            font-size: 48px;
            letter-spacing: 2px;
        }

        .clock-date {
            font-size: 16px;
            color: #555;
        }

        /* 🎂 Emoji 许愿按钮 */
        .wish-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cake-button {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
        }

        .cake-button:hover {
            transform: scale(1.1);
        }

        .cake-button:active {
            transform: scale(0.95);
        }

        /* 愿望+1 飘动效果 */
        .wish-count {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
        }

        .wish-count.show {
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-50px);
            }
        }

        /* 许愿文字 */
        .wish-text {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* ========== 第三页：信封寄语页 ========== */
        .third-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 信封上方提示文字 */
        .envelope-hint {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            pointer-events: none;
        }

        /* 信封样式 */
        .envelope {
            font-size: 120px;
            cursor: pointer;
            transition: all 0.5s ease;
            user-select: none;
            animation: float 3s ease-in-out infinite;
        }

        .envelope:hover {
            transform: scale(1.05);
        }

        .envelope.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        /* 信封浮动动画 */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* 信纸修改：固定大小，不再铺满页面 */
        .letter {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            width: 520px;
            height: 65vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.5s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /*文字滚动设置*/
            overflow-y: auto;
            overflow-x: hidden;
        }

        .letter.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%);
        }
        /*美化滚动条*/
        .letter::-webkit-scrollbar{
            width: 6px;
        }
        .letter::-webkit-scrollbar-thumb{
            background:#c8cdd3;
            border-radius:3px;
        }

        /* 信纸内容 支持滚动 */
        .letter-content {
            color: #444;
            font-size: 16px;
            line-height: 1.8;
            text-align: justify;
        }
        /*落款右对齐*/
        .sign{
            text-align: right;
            margin-top:15px;
        }

        /* 阅读完毕按钮 */
        .close-letter {
            display: block;
            margin: 25px auto 0;
            padding: 10px 25px;
            background-color: rgba(142, 156, 171, 0.8);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-letter:hover {
            background-color: rgba(142, 156, 171, 1);
            transform: scale(1.05);
        }

        /* 响应式设计 */
        @media (max-width: 650px) {
            .player {
                width: 320px;
                height: 320px;
            }
            
            .record {
                width: 260px;
                height: 260px;
            }
            
            .tonearm {
                width: 320px;
                height: 320px;
            }
            
            .tonearm-arm {
                width: 125px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .music-control {
                top: 20px;
                right: 20px;
                font-size: 24px;
            }
            
            .birthday-title {
                font-size: 24px;
                margin-bottom: 30px;
            }
            
            .cards-container {
                grid-template-columns: 1fr;
            }
            
            .clock-time {
                font-size: 36px;
            }
            
            .cake-button {
                font-size: 60px;
            }
            
            .envelope {
                font-size: 80px;
            }
            
            .letter {
                width: 92%;
                height: 70vh;
                padding: 22px;
            }
            
            .letter-content {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 第一页：黑胶播放器 -->
    <div class="page first-page">
        <!-- 播放器底座 -->
        <div class="player"></div>

        <!-- 黑胶唱片 -->
        <div class="record" id="record"></div>

        <!-- 白色唱针 -->
        <div class="tonearm">
            <div class="tonearm-base"></div>
            <div class="tonearm-arm" id="tonearm">
                <div class="tonearm-tip"></div>
            </div>
        </div>

        <!-- 顶层标题 -->
        <h1 class="title">Happy Birthday</h1>

        <!-- 操作提示 -->
        <div class="control-hint">点击唱片暂停/播放音乐</div>

        <!-- 下滑提示 -->
        <div class="scroll-hint">向下滑动继续浏览</div>

        <!-- 底部向下箭头 -->
        <div class="down-arrow">︾</div>
    </div>

    <!-- 第二页：实用功能区 -->
    <div class="page second-page">
        <!-- 右上角音乐控制按钮 -->
        <div class="music-control" id="musicControl2">🎵</div>

        <!-- 生日祝福标题 -->
        <h2 class="birthday-title">✨Bear🐻生日快乐！✨</h2>

        <div class="cards-container">
            <!-- 实时时钟卡片 -->
            <div class="card clock-card">
                <div class="card-title">现在时间</div>
                <div class="card-value clock-time" id="clock">00:00:00</div>
                <div class="clock-date" id="date">2024年01月01日 星期一</div>
            </div>

            <!-- 纪念日卡片 -->
            <div class="card">
                <div class="card-title">我们在一起已经</div>
                <div class="card-value" id="anniversary">0</div>
                <div class="card-subtitle">天 · 从2018年8月26日开始</div>
            </div>

            <!-- 生日倒计时卡片 -->
            <div class="card">
                <div class="card-title">距离下一次生日还有</div>
                <div class="card-value" id="birthday-countdown">00:00:00:00</div>
                <div class="card-subtitle">天 · 时 · 分 · 秒 · 5月29日</div>
            </div>
        </div>

        <!-- 🎂 Emoji 许愿按钮 -->
        <div class="wish-container">
            <div class="cake-button" id="cakeBtn">🎂</div>
            <div class="wish-count" id="wishCount">愿望+1 ✨</div>
            <div class="wish-text">点击蛋糕许下生日愿望</div>
        </div>

        <!-- 保留向下箭头，移除文字提示 -->
        <div class="down-arrow" style="position: absolute; bottom: 30px;">︾</div>
    </div>

    <!-- 第三页：信封寄语页 -->
    <div class="page third-page">
        <!-- 右上角音乐控制按钮 -->
        <div class="music-control" id="musicControl3">🎵</div>

        <!-- 信封上方提示文字 -->
        <div class="envelope-hint">点击查看信件</div>

        <!-- 信封 -->
        <div class="envelope" id="envelope">✉️</div>

        <!-- 信纸 -->
        <div class="letter" id="letter">
            <div class="letter-content">
给熊🐻：<br><br>
展信佳。先祝你二十岁生日快乐！也是成功地多活了一年，值得庆祝值得庆祝。<br><br>
过了十八岁之后，我对自己的年龄概念就已经开始有些模糊了，今年过生日的时候才想起来，我好像已经二十岁了，某种程度上已经开始老了（扶额）可能如此。<br><br>
写手写信需要的条件不少，特别是离开了高中之后，不能天天见面，写信这个概念从“写小纸条”真的演化成“写信”的时候，就更多要求了。我有打算过买信封信纸，再买一张生日快乐的邮票贴上去，最后放进我们学校的邮筒，但是邮政的效率一向让我不那么能够理解，再加上或多或少会有一些运损，想想看我还是打消了这个念头。你问我为什么不寄别的物流……那还能叫写信吗……装在一个放录取通知书那样大的袋子里的信……<br><br>
我小时候倒是写过信。说是写信其实也只是一个作文比赛，一张a3纸差不多大小的信纸，折起来差不多就是信封一样大，它可以自成一个信封，写完东西之后填好收信人和寄信人，就直接投出去，因为是作文比赛，我没有写给朋友然后让朋友收，信我是写给我的太奶，但是信封上的收件人嘛是我自己。过了大概一周多，我在旧家楼下看见自己寄给自己的信插在大门上……跟隔壁的报纸一样。<br><br>
我也喜欢寄明信片，之前去一个叫黄姚古镇的地方，那时候那个地方还没有那么商业化。实话实说现在什么古镇都是一个样……我爸心心念念说要再去一遍结果一去就大失所望，白开车这么久——扯远了。总之我那时候买了大概十张明信片，寄给当时用QQ能联系上的小学同学，不知道为什么那天在线的人特别少，能回我消息给我地址的也没几个，最后就寄出去大概四五张。我给自己也寄了一张，看到明信片上的字迹因为没有受到保护而花了一点，邮票的位置盖了邮戳，我心想原来这就是寄东西啊，怪好玩的。<br><br>
说着好玩实则就十几年没有寄过信了。不过要写的东西做成网页的形式也挺新奇的吧，至少挺好玩的？<br><br>
我有过很多想法，因为行动力和技术力不足，都没有认真实现。之前想的是用RPG maker给你做个小游戏当礼物，但是游戏也需要美术，需要剧情文案，还需要各种各样的设计，结果就是我趁着RPG maker打折买了下来，结果现在都还没有打开过（）<br><br>
那就退而求其次做个文游吧，就是GalGame那样子的，需要最多的是文本，美术什么的说不定我随便糊弄一下也能成呢，再不济搞成Lifeline那个样子的文游——你玩过Lifeline吗，这游戏还出了第二部，总而言之讲的是玩家帮助手机另一头孤身一人的宇航员对抗外星生物的故事，我小学的时候在外婆家没事干，拿着连不上网的平板就爱玩这个。结果这么长一个故事还有这么多的分支，用专门的软件做还要学习专门的编程技巧，想一想就要烧干我的所有想象力，在我没有惊世灵感之前我是绝对不做了……或许可能会做？主要是我也没有完全想好。<br><br>
最后就做了一个网页出来。这也算是迈出第一步，虽然页面很简单，但还算是有那么点意思。能让自己的一个小想法落地的感觉不赖，就像写东西一样。我自认没有什么设计的能力，所以只是做了一些简单的小组件，配了一首你喜欢的歌，还塞了这么一封信。<br><br>
东扯西扯讲了这么多，一下子又没有写信的感觉了，说到底谁规定我写信不能讲这讲那的。<br><br>
嗯，聊聊我送了你什么礼物吧。这个也挺可聊的。<br><br>
心想你既然喜欢ccd这种拍照的风格，或许送你个胶片机也不错。你拿到手的纯粹是个傻瓜机，一次性的，里面只有一卷胶卷，作为入门尝试完全足够。如果你拍完了，有时间去冲洗出来，觉得质感还不错的话，多开拓一种留影方式也不是不可以。就是要做好准备……价格和设备都是。我高一的时候也买过胶卷送人，完全因为对方告诉我他在家里找到一个旧的胶卷相机。那时候价格大概是四十多？现在好像是六七十吧，再加上你可能需要更好的设备才能拍出质感更好更清晰的照片啦……想这么多干嘛，先把手头上这三十多张拍完吧。<br><br>

    <script>
        //音频预先加载缓存 开局优先读取
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.load();

        // ========== 滚动颜色渐变效果 ==========
        // 定义三个页面的颜色
        const color1 = { r: 142, g: 156, b: 171 }; // 第一页 #8e9cab
        const color2 = { r: 159, g: 197, b: 232 }; // 第二页 明亮天蓝色 #9fc5e8
        const color3 = { r: 180, g: 210, b: 240 }; // 第三页 更浅的天蓝色 #b4d2f0

        // 监听滚动事件，动态改变背景颜色
        window.addEventListener('scroll', () => {
            // 获取滚动位置和页面总高度
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            const totalHeight = windowHeight * 2;
            
            // 计算滚动进度（0到2之间）
            const progress = scrollY / windowHeight;
            
            let r, g, b;
            
            if (progress <= 1) {
                // 第一页到第二页的渐变
                r = Math.round(color1.r + (color2.r - color1.r) * progress);
                g = Math.round(color1.g + (color2.g - color1.g) * progress);
                b = Math.round(color1.b + (color2.b - color1.b) * progress);
            } else {
                // 第二页到第三页的渐变
                const p = progress - 1;
                r = Math.round(color2.r + (color3.r - color2.r) * p);
                g = Math.round(color2.g + (color3.g - color2.g) * p);
                b = Math.round(color2.b + (color3.b - color2.b) * p);
            }
            
            // 应用背景颜色
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });

        // ========== 全局音乐控制逻辑 ==========
        const record = document.getElementById('record');
        const tonearm = document.getElementById('tonearm');
        const musicControl2 = document.getElementById('musicControl2');
        const musicControl3 = document.getElementById('musicControl3');
        
        // 初始状态：正在播放
        let isPlaying = true;

        // 更新所有音乐控制按钮状态
        function updateMusicButtons() {
            const icon = isPlaying ? '🎵' : '🔇';
            musicControl2.textContent = icon;
            musicControl3.textContent = icon;
        }

        // 统一的音乐切换函数
        function toggleMusic() {
            if (isPlaying) {
                // 暂停：唱针抬起 → 唱片停止 → 音乐暂停
                tonearm.classList.add('lifted');
                record.classList.add('paused');
                bgMusic.pause();
                isPlaying = false;
            } else {
                // 播放：唱针回落 → 唱片转动 → 音乐播放
                tonearm.classList.remove('lifted');
                record.classList.remove('paused');
                bgMusic.play();
                isPlaying = true;
            }
            updateMusicButtons();
        }

        // 页面首次点击激活音频（浏览器自动播放限制）
        document.addEventListener('click', () => {
            bgMusic.play();
            updateMusicButtons();
        }, { once: true });

        // 第一页：点击唱片控制音乐
        record.addEventListener('click', toggleMusic);

        // 第二页：点击右上角按钮控制音乐
        musicControl2.addEventListener('click', toggleMusic);

        // 第三页：点击右上角按钮控制音乐
        musicControl3.addEventListener('click', toggleMusic);

        // ========== 第二页：实用功能逻辑 ==========
        // 1. 实时时钟
        function updateClock() {
            const now = new Date();
            
            // 更新时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 更新日期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            document.getElementById('date').textContent = `${year}年${month}月${day}日 ${weekDay}`;
        }

        // 2. 纪念日计算（从2018年8月26日开始）
        function updateAnniversary() {
            const startDate = new Date(2018, 7, 26); // 月份从0开始
            const now = new Date();
            const diffTime = now - startDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('anniversary').textContent = diffDays;
        }

        // 3. 生日倒计时（5月29日）
        function updateBirthdayCountdown() {
            const now = new Date();
            let birthday = new Date(now.getFullYear(), 4, 29); // 5月29日
            
            // 如果今年生日已经过了，计算明年的
            if (now > birthday) {
                birthday = new Date(now.getFullYear() + 1, 4, 29);
            }
            
            const diffTime = birthday - now;
            
            // 计算天、时、分、秒
            const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffTime % (1000 * 60)) / 1000);
            
            document.getElementById('birthday-countdown').textContent = 
                `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 4. 🎂 许愿功能
        const cakeBtn = document.getElementById('cakeBtn');
        const wishCount = document.getElementById('wishCount');

        cakeBtn.addEventListener('click', () => {
            // 重置动画
            wishCount.classList.remove('show');
            void wishCount.offsetWidth; // 触发重绘
            wishCount.classList.add('show');
        });

        // ========== 第三页：信封信纸交互 ==========
        const envelope = document.getElementById('envelope');
        const letter = document.getElementById('letter');
        const closeLetter = document.getElementById('closeLetter');

        // 点击信封显示信纸
        envelope.addEventListener('click', () => {
            envelope.classList.add('hidden');
            setTimeout(() => {
                letter.classList.add('show');
            }, 300);
        });

        // 点击阅读完毕按钮关闭信纸
        closeLetter.addEventListener('click', () => {
            letter.classList.remove('show');
            setTimeout(() => {
                envelope.classList.remove('hidden');
            }, 300);
        });

        // 初始化并每秒更新所有时间相关功能
        function updateAll() {
            updateClock();
            updateAnniversary();
            updateBirthdayCountdown();
        }

        updateAll();
        setInterval(updateAll, 1000);
    </script>
